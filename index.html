<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>URP Corporation</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;800&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet" />
<style>
  html,body{margin:0;height:100%;}
  body{
    display:flex;align-items:center;justify-content:center;min-height:100vh;
    background:radial-gradient(900px 600px at 50% 30%,#2a231c,#16120e);
    color:#e9dcc0;font-family:"Nanum Myeongjo",serif;text-align:center;padding:24px;
  }
  .crest{
    width:96px;height:96px;border-radius:50%;margin:0 auto 26px;
    background:radial-gradient(circle at 35% 30%,#9a3b37,#7c2d2a 55%,#5e1f1d);
    display:flex;align-items:center;justify-content:center;color:#f3e6c8;
    font-family:"Cormorant Garamond",serif;font-size:30px;letter-spacing:1px;
    box-shadow:0 10px 26px rgba(0,0,0,.5),inset 0 0 16px rgba(0,0,0,.35);
  }
  h1{font-family:"Cormorant Garamond",serif;letter-spacing:8px;font-weight:600;font-size:22px;margin:0 0 8px;color:#cdbb90;text-transform:uppercase;}
  .mean{font-family:"Cormorant Garamond",serif;letter-spacing:5px;font-size:13px;color:#a8843f;margin-bottom:20px;}
  p{font-size:14px;line-height:1.9;color:#8a7c5e;max-width:360px;margin:0 auto;}
</style>
</head>
<body>
  <div>
    <div class="crest">URP</div>
    <h1>URP Corporation</h1>
    <div class="mean">U &middot; R &middot; PROFESSOR</div>
    <p>이곳은 초대받은 분을 위한 공간입니다.<br/>받으신 개인 초대 링크를 통해 입장해 주세요.</p>
  </div>
</body>
</html>
